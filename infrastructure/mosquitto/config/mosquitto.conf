# Allow anonymous connections (Mosquitto 2.x defaults to false)
allow_anonymous true

# Listener for plain TCP MQTT (matches docker-compose port 1883)
listener 1883
protocol mqtt

# Listener for WebSocket clients (matches docker-compose port 9001)
listener 9001
protocol websockets

# Persistence / logging (use existing mounted paths)
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Optional: uncomment to increase verbosity for debugging
# log_type all
